name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please **do not** report
        security vulnerabilities here — follow [SECURITY.md](../../SECURITY.md)
        instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps (commands, config) that trigger the bug.
      placeholder: |
        1. Run `...`
        2. Send `...`
        3. See error
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
  - type: dropdown
    id: transport
    attributes:
      label: Transport (if relevant)
      options:
        - "not sure"
        - "tcp (loopback)"
        - "uds (unix socket)"
        - "remote access (0.0.0.0 + token)"
        - "stdio"
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of the version command, or the commit SHA you built from.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant daemon or CLI output. Redact any tokens or credentials.
      render: shell
    validations:
      required: false
