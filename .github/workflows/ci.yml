name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # turbo.jsonc sets ui:"tui"; force the stream renderer in non-interactive CI.
  TURBO_UI: "false"
  # Optional Turbo remote cache. Set TURBO_TOKEN (Actions secret, repo-scoped) and
  # TURBO_TEAM (Actions variable) to share the build cache across runs and runners.
  # Both default to empty strings when unset — Turbo silently falls back to the
  # local cache, so CI is fully functional without them.
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # OS-independent checks — typecheck, lint, knip in one job to share bun install.
  checks:
    name: checks
    runs-on: macos-latest
    if: "!startsWith(github.event.head_commit.message, 'chore(main): release')"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run quality:check
      - run: git diff --exit-code

  # Unit tests have no transport, provider-process, or live-network dependencies. Keep them in a
  # separate failure domain and collect coverage only on Linux so instrumentation cannot distort
  # E2E timing.
  unit:
    name: unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: "!startsWith(github.event.head_commit.message, 'chore(main): release')"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test unit
        env:
          MONAD_TEST_COVERAGE: ${{ runner.os == 'Linux' && '1' || '0' }}
        run: bun run test:unit

      - name: Upload coverage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            apps/*/coverage/lcov.info
            packages/*/coverage/lcov.info
          if-no-files-found: ignore

  # Hermetic daemon E2E uses real HTTP/SSE/stdio transports and local subprocess fixtures, but
  # excludes live providers, host-installed provider sessions, and dependency-container tests
  # before Bun loads those files.
  hermetic-e2e:
    name: hermetic e2e (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: "!startsWith(github.event.head_commit.message, 'chore(main): release')"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build sandbox launcher (Linux)
        if: runner.os == 'Linux'
        run: |
          gcc -O2 -s -static \
            -o "$(dirname "$(which bun)")/monad-sandbox-launcher" \
            apps/monad/native/sandbox-launcher/main.c

      - name: Install MinGW (Windows sandbox launcher cross-compile)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y --no-install-recommends gcc-mingw-w64-x86-64

      - name: Build Windows sandbox launchers (Low IL + AppContainer, x64 spike)
        if: runner.os == 'Linux'
        run: |
          BUN_DIR="$(dirname "$(which bun)")"
          # Low Integrity launcher — baseline, known-good
          x86_64-w64-mingw32-gcc -O2 -s -static -municode \
            -o "${BUN_DIR}/monad-sandbox-launcher.exe" \
            apps/monad/native/sandbox-launcher/windows.c \
            -ladvapi32
          echo "✓ Low IL launcher compiled"
          # AppContainer launcher — validates MinGW header availability for PROC_THREAD_ATTRIBUTE_SECURITY_CAPABILITIES
          x86_64-w64-mingw32-gcc -O2 -s -static -municode \
            -o "${BUN_DIR}/monad-sandbox-appcontainer.exe" \
            apps/monad/native/sandbox-launcher/windows-appcontainer.c \
            -ladvapi32 -luserenv
          echo "✓ AppContainer launcher compiled"

      # Compile-gate the macOS Mo sprite shell so it can't rot (it's outside the Bun
      # build/typecheck). Mo is macOS-only for now (Cocoa); no Linux/Windows gate yet.
      - name: Build Mo sprite (macOS)
        if: runner.os == 'macOS'
        run: bash apps/mo/native/macos/build.sh /tmp/Mo.app

      - name: Test hermetic daemon E2E
        run: bun run test:e2e:daemon

  # Real third-party dependency tests. The normal e2e suite uses mocks/local fixtures; tests that need
  # provider CLIs or host archive binaries run inside a cached container image with those dependencies
  # preinstalled.
  e2e-deps:
    name: e2e deps container
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore(main): release')"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.e2e-deps
          target: test
          cache-from: type=gha,scope=e2e-deps
          cache-to: type=gha,scope=e2e-deps,mode=max
