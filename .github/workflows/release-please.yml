name: Release Please

on:
  push:
    branches: [main]

# Default GITHUB_TOKEN cannot trigger other workflows (including `on: pull_request` CI).
# RELEASE_PLEASE_TOKEN is a fine-grained PAT with Contents + Pull Requests write on this repo.
# To create one: GitHub → Settings → Developer settings → Fine-grained tokens → Generate.
# Store it as repo secret RELEASE_PLEASE_TOKEN. Falls back to GITHUB_TOKEN if absent (CI
# won't run on the release PR, but everything else still works).
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
