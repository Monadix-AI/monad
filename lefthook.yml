pre-commit:
  commands:
    quality-gate:
      run: bun run quality:precommit -- {staged_files}
      stage_fixed: true

post-merge:
  commands:
    sync-after-git:
      run: bash .lefthook/sync-after-git.sh ORIG_HEAD HEAD
      interactive: true

post-checkout:
  commands:
    sync-after-git:
      run: bash .lefthook/sync-after-git.sh {1} {2}
      interactive: true
    direnv-allow:
      run: '[ "{3}" = ''1'' ] && [ -f .envrc ] && direnv allow || true'

post-rewrite:
  commands:
    sync-after-git:
      interactive: true
      run: bash .lefthook/sync-after-git.sh ORIG_HEAD HEAD

commit-msg:
  jobs:
    - run: bun commitlint --edit {1}
